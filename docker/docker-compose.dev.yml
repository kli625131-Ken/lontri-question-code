version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: problem-mysql-dev
    restart: unless-stopped
    env_file:
      - ./.env.example
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data-dev:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - problem-network

  backend:
    image: maven:3.9-eclipse-temurin-21
    container_name: problem-backend-dev
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      APP_DEFAULT_PASSWORD: ${APP_DEFAULT_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - maven-cache:/root/.m2
    working_dir: /app
    command: mvn spring-boot:run -Dspring-boot.run.profiles=dev
    depends_on:
      - mysql
    networks:
      - problem-network

  frontend:
    image: node:20-alpine
    container_name: problem-frontend-dev
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/app
      - node-modules:/app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    networks:
      - problem-network

volumes:
  mysql-data-dev:
  maven-cache:
  node-modules:

networks:
  problem-network:
    driver: bridge
