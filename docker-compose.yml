services:
  mysql:
    image: mysql:8.0
    container_name: ${APP_NAME:-lontri}-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-problem_db}
      MYSQL_USER: ${MYSQL_USER:-lontri}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_PORT:-3308}:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ${APP_NAME:-lontri}-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/problem_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-lontri}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      APP_DEFAULT_PASSWORD: ${APP_DEFAULT_PASSWORD:?Set APP_DEFAULT_PASSWORD in .env}
      OPS_IMPORT_BOOTSTRAP_ENABLED: ${OPS_IMPORT_BOOTSTRAP_ENABLED:-true}
      OPS_IMPORT_BOOTSTRAP_FILE: /opt/app/docs/${OPS_IMPORT_BOOTSTRAP_FILE:-LONTRI项目运维记录.xlsx}
      OPS_IMPORT_RESET_ON_BOOTSTRAP: ${OPS_IMPORT_RESET_ON_BOOTSTRAP:-false}
      OPS_IMPORT_DEFAULT_REMIND_AFTER_DAYS: ${OPS_IMPORT_DEFAULT_REMIND_AFTER_DAYS:-7}
      OPS_UPLOAD_ROOT_PATH: ${OPS_UPLOAD_ROOT_PATH:-/uploads}
      OPS_UPLOAD_MAX_FILE_SIZE_BYTES: ${OPS_UPLOAD_MAX_FILE_SIZE_BYTES:-10485760}
    ports:
      - "${BACKEND_PORT:-8082}:8080"
    volumes:
      - ./docs:/opt/app/docs:ro
      - ./uploads:/uploads
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ${APP_NAME:-lontri}-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-82}:80"
    depends_on:
      - backend

volumes:
  mysql-data:
